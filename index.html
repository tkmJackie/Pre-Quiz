<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src https://cct-english-api.tkm12325.workers.dev; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
  <title>Zerqour LMS</title>
  <img
  src="/images/logo.png"
  alt="Zerquor"
  class="logo-icon"
  />
  <link rel="stylesheet" href="styles.css" />
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/qrcode.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Zerqour LMS</p>
      <h1>Zerqour LMS α版</h1>
    </div>
    <div id="sessionBox" class="session-box hidden"></div>
  </header>

  <main>
    <section id="authView" class="grid auth-grid">
      <div class="card">
        <h2>ログイン</h2>
        <label>メールアドレス</label>
        <input id="loginUsername" type="email" autocomplete="username" placeholder="user@example.com" />
        <label>パスワード</label>
        <div class="password-row">
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button type="button" class="ghost mini" data-toggle-password="loginPassword">表示</button>
        </div>
        <button id="loginButton">ログイン</button>
      </div>

      <div id="twoFactorLoginCard" class="card hidden">
        <h2>2要素認証</h2>
        <p class="muted">認証アプリに表示された6桁コードを入力してください。</p>
        <label>認証コード</label>
        <input id="twoFactorCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" />
        <div class="button-list">
          <button id="twoFactorLoginButton">認証してログイン</button>
          <button type="button" class="ghost" id="cancelTwoFactorButton">戻る</button>
        </div>
      </div>
    </section>

    <section id="roleView" class="card hidden">
      <h2>利用するロールを選択</h2>
      <div id="roleButtons" class="button-list"></div>
    </section>

    <section id="appView" class="hidden">
      <nav id="roleNav" class="role-nav"></nav>
      <div id="message" class="message hidden"></div>

      <section id="adminView" class="hidden dashboard"></section>
      <section id="companyView" class="hidden dashboard"></section>
      <section id="studentView" class="hidden dashboard"></section>
      <section id="contactView" class="hidden dashboard"></section>
      <section id="twoFactorView" class="hidden dashboard"></section>
    </section>
  </main>

  <template id="ticketTemplate">
    <div class="ticket-detail">
      <div class="ticket-comments"></div>
      <textarea class="ticket-reply" rows="3" placeholder="返信内容"></textarea>
      <div class="button-list">
        <button class="send-reply">返信</button>
        <button class="close-ticket ghost">クローズ</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
